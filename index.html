<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portofolio Saya - Andi Haganta Ginting</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
  <style>
    body {
      background: url('https://tse4.mm.bing.net/th?id=OIP.bEo0_HjOIVslOm4I-E9qJwHaEo&pid=Api&P=0&h=220') no-repeat center center fixed;
      background-size: cover;
      position: relative;
      margin: 0;
      font-family: 'Fira Code', monospace;
      transition: background 0.5s ease;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 0;
      transition: background 0.5s ease;
    }

    .terminal {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 60px auto;
      background: rgba(0, 0, 0, 0.85);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ff88;
      color: #00ff88;
      transition: background 0.5s ease, color 0.5s ease;
    }

    .output {
      white-space: pre-wrap;
      margin-bottom: 10px;
      min-height: 300px;
    }

    .input-line {
      display: flex;
      align-items: center;
    }

    .prompt {
      margin-right: 5px;
      color: inherit;
    }

    #cli-input {
      background: transparent;
      border: none;
      outline: none;
      color: inherit;
      font-family: inherit;
      font-size: 1em;
      width: 100%;
      caret-color: #00ff88;
      animation: blink-caret 1s step-end infinite;
    }

    @keyframes blink-caret {
      50% { caret-color: transparent; }
    }

    ::selection {
      background: #00ff88;
      color: #000;
    }

    .light-theme body::before {
      background: rgba(255, 255, 255, 0.85);
    }

    .light-theme .terminal {
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      box-shadow: 0 0 20px #999;
    }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="output" id="output"></div>
    <div class="input-line">
      <span class="prompt">$</span>
      <input type="text" id="cli-input" autofocus autocomplete="off" />
    </div>
  </div>

  <script>
    const input = document.getElementById('cli-input');
    const output = document.getElementById('output');
    const body = document.body;
    const history = [];
    let historyIndex = -1;

    const commands = {
      help: `Perintah yang tersedia:\n- help\n- about\n- skills\n- projects\n- contact\n- clear`,

      about: `Halo, saya Andi Haganta Ginting.\nSeorang ASN di Pemerintah Provinsi Sumatera Utara dengan peminatan di bidang Teknologi Informasi.\nSaya sehari-hari bekerja sebagai Prakom dengan tupoksi membantu di bidang supporting IT, dan suka membuat aplikasi web dan tools yang berguna untuk menunjang pencapaian target kerja organisasi.`,

      skills: `Kemampuan teknis:\n- HTML, CSS, Native PHP\n- Python dan Linux`,

      projects: `Daftar proyek:\n- Aplikasi Buku Tamu Digital\n- Aplikasi Approval Konten\n- Aplikasi Manajemen Pengetahuan\n- Aplikasi Pengelolaan Sarana dan Prasarana`,

      contact: `Hubungi saya:\n- Email: bytenobite@domain.com\n- GitHub: https://github.com/cimorypedas`,

      clear: "clear"
    };

    function typeText(text, speed = 10, callback) {
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          output.innerText += text.charAt(i);
          i++;
        } else {
          clearInterval(interval);
          if (callback) callback();
        }
      }, speed);
    }

    function handleCommand(cmd) {
      const command = cmd.trim().toLowerCase();

      if (command.startsWith('theme')) {
        if (command.includes('light')) {
          body.classList.add('light-theme');
          typeText(`$ ${command}\nTema diganti ke LIGHT.\n\n`);
        } else if (command.includes('dark')) {
          body.classList.remove('light-theme');
          typeText(`$ ${command}\nTema diganti ke DARK.\n\n`);
        } else {
          typeText(`$ ${command}\nOpsi tema tidak dikenal. Gunakan 'theme light' atau 'theme dark'.\n\n`);
        }
        return;
      }

      if (commands[command]) {
        if (command === 'clear') {
          output.innerText = '';
        } else {
          typeText(`$ ${command}\n${commands[command]}\n\n`);
        }
      } else {
        typeText(`$ ${command}\nPerintah tidak dikenali. Ketik "help" untuk bantuan.\n\n`);
      }
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const command = input.value;
        history.push(command);
        historyIndex = history.length;
        handleCommand(command);
        input.value = '';
        output.scrollTop = output.scrollHeight;
      } else if (e.key === 'ArrowUp') {
        if (historyIndex > 0) {
          historyIndex--;
          input.value = history[historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        if (historyIndex < history.length - 1) {
          historyIndex++;
          input.value = history[historyIndex];
        } else {
          input.value = '';
        }
      }
    });

    // Fokus otomatis saat load dan saat klik di mana saja
    window.onload = () => input.focus();
    document.addEventListener('click', () => input.focus());
  </script>
</body>
</html>
